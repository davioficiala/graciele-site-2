<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Loja</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topo">
  <button class="btn-menu" onclick="toggleMenu()">☰</button>
  🛒 Minha Loja
</div>

<!-- MENU LATERAL -->
<div id="menu" class="menu">
  <button onclick="abrirModal('lojista')">Lojista</button>
  <button onclick="abrirModal('usuario')">Usuário</button>
  <button onclick="abrirModal('adm')">ADM</button>
  <button onclick="abrirModal('graciele')">Graciele</button>
  <button onclick="abrirModal('produto')">Produto</button>
</div>

<!-- BUSCA -->
<div class="busca">
  <input id="pesquisa" placeholder="🔎 Buscar produtos...">
</div>

<!-- VITRINE -->
<div id="vitrine"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-conteudo">

    <h3 id="tituloModal"></h3>

    <div id="formulario"></div>

    <button onclick="fecharModal()">Fechar</button>

  </div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
